services:
  # PostgreSQL Database
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vibeanalytix_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (message broker and cache)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@postgres:5432/vibeanalytix_db
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev-secret-key-change-in-production
      # Provider mode — use local Ollama (no API keys needed)
      LLM_PROVIDER_MODE: local
      EMBEDDING_PROVIDER_MODE: local
      # Ollama runs on the host — use host.docker.internal
      LOCAL_LLM_BASE_URL: http://host.docker.internal:11434
      LOCAL_EMBEDDING_BASE_URL: http://host.docker.internal:11434
      LOCAL_LLM_MODEL: ${LOCAL_LLM_MODEL:-kimi-k2.6:cloud}
      LOCAL_EMBEDDING_MODEL: nomic-embed-text
      LOCAL_LLM_TIMEOUT_SECONDS: "180"
      LOCAL_EMBEDDING_TIMEOUT_SECONDS: "60"
      DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app
      - /tmp:/tmp

  # Celery Worker
  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@postgres:5432/vibeanalytix_db
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev-secret-key-change-in-production
      LLM_PROVIDER_MODE: local
      EMBEDDING_PROVIDER_MODE: local
      LOCAL_LLM_BASE_URL: http://host.docker.internal:11434
      LOCAL_EMBEDDING_BASE_URL: http://host.docker.internal:11434
      LOCAL_LLM_MODEL: ${LOCAL_LLM_MODEL:-kimi-k2.6:cloud}
      LOCAL_EMBEDDING_MODEL: nomic-embed-text
      LOCAL_LLM_TIMEOUT_SECONDS: "180"
      LOCAL_EMBEDDING_TIMEOUT_SECONDS: "60"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app
      - /tmp:/tmp

  # Celery Beat (scheduler)
  beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A app.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@postgres:5432/vibeanalytix_db
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev-secret-key-change-in-production
      LLM_PROVIDER_MODE: local
      EMBEDDING_PROVIDER_MODE: local
      LOCAL_LLM_BASE_URL: http://host.docker.internal:11434
      LOCAL_EMBEDDING_BASE_URL: http://host.docker.internal:11434
      LOCAL_LLM_MODEL: ${LOCAL_LLM_MODEL:-kimi-k2.6:cloud}
      LOCAL_EMBEDDING_MODEL: nomic-embed-text
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app

  # Next.js Frontend
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api

volumes:
  postgres_data:
